<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link rel="icon" type="image/png" href="/assets/department-logo.png" />
    <link rel="stylesheet" href="/fonts.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-brand">
          <img class="brand-logo" src="/assets/department-logo.png" alt="Logo du departement" />
          <div>
            <p class="eyebrow">Departement des missions domestiques</p>
            <h1>Connexion a l'application</h1>
          </div>
        </div>

        <p class="login-copy">
          Connecte-toi pour acceder au tableau de bord, au suivi academie et a l'administration des utilisateurs.
        </p>

        <form id="login-form" class="login-form">
          <label class="form-field">
            <span>Email</span>
            <input id="login-email" class="filter-control" type="email" autocomplete="username" required />
          </label>

          <label class="form-field">
            <span>Mot de passe</span>
            <input id="login-password" class="filter-control" type="password" autocomplete="current-password" required />
          </label>

          <button id="login-submit" class="primary-action" type="submit">Se connecter</button>
        </form>

        <div class="login-features">
          <span class="login-feature-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Tableau de bord
          </span>
          <span class="login-feature-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Suivi académie
          </span>
          <span class="login-feature-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Administration
          </span>
        </div>

        <p class="login-legal-link"><a href="/legal.html">Mentions légales & confidentialité</a></p>
      </section>
    </main>

    <div id="app-feedback" class="app-feedback" hidden></div>
    <script src="/auth-client.js" defer></script>
    <script src="/login.js" defer></script>
  </body>
</html>
