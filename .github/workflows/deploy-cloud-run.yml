name: Deploy to Cloud Run

on:
  workflow_dispatch:

env:
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
  REGION: ${{ vars.GCP_REGION }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          project_id: ${{ env.PROJECT_ID }}
          env_vars: |-
            GOOGLE_SPREADSHEET_ID=${{ vars.GOOGLE_SPREADSHEET_ID }}
            GOOGLE_SHEET_MEMBERS_RANGE=${{ vars.GOOGLE_SHEET_MEMBERS_RANGE }}
            GOOGLE_SHEET_MEETINGS_RANGE=${{ vars.GOOGLE_SHEET_MEETINGS_RANGE }}
            GOOGLE_SHEET_TRAINING_RANGE=${{ vars.GOOGLE_SHEET_TRAINING_RANGE }}
            GOOGLE_CALENDAR_ID=${{ vars.GOOGLE_CALENDAR_ID }}
            GOOGLE_CALENDAR_PAST_DAYS=${{ vars.GOOGLE_CALENDAR_PAST_DAYS }}
            GOOGLE_CALENDAR_FUTURE_DAYS=${{ vars.GOOGLE_CALENDAR_FUTURE_DAYS }}
            FIRESTORE_PROJECT_ID=${{ vars.FIRESTORE_PROJECT_ID }}
            FIRESTORE_DATABASE_ID=${{ vars.FIRESTORE_DATABASE_ID }}
          flags: >-
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --allow-unauthenticated
