# ─────────────────────────────────────────────────────────────────────────────
#  cloudbuild.yaml – attendance-bot
#
#  Monorepo setup: Cloud Build clones the full repo. The Docker build uses
#  the repo root as context so Dockerfiles can COPY from shared/python/.
#
#  GCP trigger must be configured with:
#    dir: apps/attendance-bot          (where this file lives)
#    includedFiles:
#      - apps/attendance-bot/**
#      - shared/python/**
#
#  Substitution variables:
#    _REGION      – Cloud Run region   (default: europe-west1)
#    _SERVICE     – Cloud Run service  (default: attendance-bot)
#    _REGISTRY    – Artifact Registry  (e.g. europe-west1-docker.pkg.dev/PROJECT/attendance-bot)
#    _RUNTIME_SA  – Cloud Run runtime SA
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: "europe-west1"
  _SERVICE: "attendance-bot"
  _REGISTRY: "europe-west1-docker.pkg.dev/cedar-freedom-138023/attendance-bot"
  _RUNTIME_SA: "649794681789-compute@developer.gserviceaccount.com"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster builds

steps:

  # ── Step 1: Build the Docker image (root = build context) ──────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "--tag=${_REGISTRY}/${_SERVICE}:$SHORT_SHA"
      - "--tag=${_REGISTRY}/${_SERVICE}:latest"
      - "--cache-from=${_REGISTRY}/${_SERVICE}:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "-f=apps/attendance-bot/Dockerfile"
      - "."
    env:
      - "DOCKER_BUILDKIT=1"

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-sha"
    waitFor: ["build"]
    args:
      - "push"
      - "${_REGISTRY}/${_SERVICE}:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    waitFor: ["build"]
    args:
      - "push"
      - "${_REGISTRY}/${_SERVICE}:latest"

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy"
    waitFor: ["push-sha"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_REGISTRY}/${_SERVICE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--service-account=${_RUNTIME_SA}"
      - "--allow-unauthenticated"        # Telegram must reach the webhook
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=1"              # ← avoids cold starts
      - "--max-instances=3"
      - "--concurrency=80"
      - "--timeout=60s"
      - "--set-secrets=TELEGRAM_BOT_TOKEN=attendance-telegram-bot-token:latest"
      - "--set-secrets=GEMINI_API_KEY=gemini-api-key:latest"
      - "--set-secrets=GOOGLE_SHEET_ID=attendance-google-sheet-id:latest"
      - "--set-secrets=GOOGLE_SERVICE_ACCOUNT_JSON=attendance-service-account-key:latest"
      - "--set-secrets=WEBHOOK_URL=attendance-webhook-url:latest"
      - "--set-secrets=FIRESTORE_PROJECT_ID=attendance-firestore-project-id:latest"
      - "--set-secrets=FIRESTORE_DATABASE_ID=attendance-firestore-database-id:latest"
      - "--set-secrets=BOT_API_KEY=bot-api-key-attendance:latest"
      - "--set-env-vars=API_BASE_URL=https://member-evolution-dashboard-vq3zefjqia-od.a.run.app"
      - "--no-traffic"                  # stage the new revision first …..

  # ── Step 4: Shift 100% traffic to the new revision ──────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "migrate-traffic"
    waitFor: ["deploy"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update-traffic"
      - "${_SERVICE}"
      - "--region=${_REGION}"
      - "--to-latest"

# Keep the image in Artifact Registry
images:
  - "${_REGISTRY}/${_SERVICE}:$SHORT_SHA"
  - "${_REGISTRY}/${_SERVICE}:latest"
