# ─────────────────────────────────────────────────────────────────────────────
#  cloudbuild.yaml – mannam-bot
#
#  Monorepo setup: Cloud Build clones the full repo. The Docker build uses
#  the repo root as context so Dockerfiles can COPY from shared/python/.
#
#  GCP trigger must be configured with:
#    dir: apps/mannam-bot              (where this file lives)
#    includedFiles:
#      - apps/mannam-bot/**
#      - shared/python/**
#
#  Substitution variables:
#    _REGION      – Cloud Run region   (default: europe-west1)
#    _SERVICE     – Cloud Run service  (default: google-calendar-bot)
#    _REGISTRY    – Artifact Registry  (e.g. europe-west1-docker.pkg.dev/PROJECT/my-repo)
#    _DOMAIN      – Webhook domain for the bot
#    _API_BASE_URL – Central web app URL
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: "europe-west1"
  _SERVICE: "google-calendar-bot"
  _REGISTRY: "europe-west1-docker.pkg.dev/cedar-freedom-138023/my-repo"
  _DOMAIN: "https://google-calendar-bot-649794681789.europe-west1.run.app"
  _API_BASE_URL: "https://member-evolution-dashboard-vq3zefjqia-od.a.run.app"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:

  # ── Step 1: Build the Docker image (root = build context) ──────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "--tag=${_REGISTRY}/${_SERVICE}:$SHORT_SHA"
      - "--tag=${_REGISTRY}/${_SERVICE}:latest"
      - "--cache-from=${_REGISTRY}/${_SERVICE}:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "-f=apps/mannam-bot/Dockerfile"
      - "."
    env:
      - "DOCKER_BUILDKIT=1"

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-sha"
    waitFor: ["build"]
    args:
      - "push"
      - "${_REGISTRY}/${_SERVICE}:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    waitFor: ["build"]
    args:
      - "push"
      - "${_REGISTRY}/${_SERVICE}:latest"

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy"
    waitFor: ["push-sha"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image=${_REGISTRY}/${_SERVICE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=1"
      - "--max-instances=3"
      - "--concurrency=80"
      - "--timeout=60s"
      - "--set-secrets=BOT_TOKEN=bot-token:latest"
      - "--set-secrets=GEMINI_API_KEY=gemini-api-key:latest"
      - "--set-secrets=service_account_key=service-account-key:latest"
      - "--set-secrets=BOT_API_KEY=bot-api-key-mannam:latest"
      - "--set-env-vars=DOMAIN=${_DOMAIN},API_BASE_URL=${_API_BASE_URL}"
      - "--no-traffic"

  # ── Step 4: Shift 100% traffic to the new revision ──────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "migrate-traffic"
    waitFor: ["deploy"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update-traffic"
      - "${_SERVICE}"
      - "--region=${_REGION}"
      - "--to-latest"

images:
  - "${_REGISTRY}/${_SERVICE}:$SHORT_SHA"
  - "${_REGISTRY}/${_SERVICE}:latest"
